<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accepted Pickups — FoodSphere 360</title>
<meta name="description" content="Manage and coordinate logistics for surplus food donations you have accepted on FoodSphere 360.">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="container">
    <a href="index.html" class="brand" data-transition>
      <span class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8 6 6 9 6 13a6 6 0 0 0 12 0c0-4-2-7-6-11z"/></svg>
      </span>
      FoodSphere<span class="accent">360</span>
    </a>
    <div class="nav-actions">
      <div style="width: 40px; height: 40px;"></div>
    </div>
  </div>
</header>

<!-- MAIN CONTENT -->
<main class="dashboard-hero">
  <div class="container">
    
    <div class="dashboard-title-row">
      <div>
        <a href="ngo-dashboard.html" class="auth-back" style="margin-bottom: 16px;" data-transition>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          Back to Dashboard
        </a>
        <h2 style="font-size: 2.2rem; margin-top: 10px;">Accepted Pickups</h2>
        <p style="color: var(--ink-soft); margin-top: 6px;">Coordinate collection windows, print details, and update statuses once distributed.</p>
      </div>
      <div>
        <a href="available-donations.html" class="btn btn-accent btn-lg" data-transition>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          Browse Available Food
        </a>
      </div>
    </div>

    <!-- TABLE CONTAINER -->
    <div class="dashboard-card">
      <h3>Active Accepted Logistics</h3>
      <div class="dashboard-table-container" id="acceptedDonationsList">
        <div class="empty-state">
          <p>Loading accepted listings...</p>
        </div>
      </div>
    </div>

  </div>
</main>

<!-- FOOTER -->
<footer class="footer">
  <div class="container">
    <div class="footer-bottom" style="border-top: none; padding: 40px 0;">
      <span>© 2026 FoodSphere 360. All rights reserved.</span>
      <div class="footer-bottom-links">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
      </div>
    </div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
